{% extends "base.html" %}

{% block content %}
<div class="login-page-wrapper">
    <div class="login-card">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="login-logo">
        <h2>SYSTEM LOGIN</h2>

        {# Flash Message Support #}
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: #ff4d4d; font-size: 0.9rem; text-align: center;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <label for="username">USER IDENTIFICATION</label>
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <label for="password">ACCESS KEY</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="Password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                    <span id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; user-select: none;">
                        👁️
                    </span>
                </div>
            </div>
            
            <button type="submit" class="login-btn">LOGIN NOW</button>
        </form>
        
        <p style="margin-top: 25px; font-size: 0.8rem; color: #888; text-align: center;">
            New researcher? <a href="{{ url_for('register') }}" style="color: #3498db; text-decoration: none; font-weight: bold;">Register here</a>
        </p>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        // Toggle the type attribute between password and text
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        
        // Change the icon/emoji based on state
        this.textContent = type === 'password' ? '👁️' : '🙈';
    });
</script>

{% endblock %}
