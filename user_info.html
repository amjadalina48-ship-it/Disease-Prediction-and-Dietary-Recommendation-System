{% extends "base.html" %}

{% block title %}User Details - Disease Predictor{% endblock %}

{% block content %}
    <div style="max-width: 500px; margin: 40px auto; padding: 20px;">
        
        <div style="background: rgba(255, 255, 255, 0.95); 
                    padding: 40px; 
                    border: 2px solid #2c3e50; /* DARK SOLID BOUNDARY */
                    border-radius: 12px; 
                    box-shadow: 0 10px 30px rgba(0,0,0,0.15);">

            <h2 style="text-align: center; margin-top: 0; color: #333;">Enter Your Details</h2>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">
                Please provide your basic information to proceed with the prediction.
            </p>

            <form method="POST" action="{{ url_for('user_info') }}">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #444;">Full Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required 
                           style="width: 100%; padding: 12px; border: 1.5px solid #bdc3c7; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #444;">Age</label>
                    <input type="number" name="age" min="1" max="120" placeholder="e.g. 25" required 
                           style="width: 100%; padding: 12px; border: 1.5px solid #bdc3c7; border-radius: 6px; box-sizing: border-box;">
                </div>

                <button type="submit" style="width: 100%; 
                                            background: linear-gradient(to right, #3498db, #2ecc71); 
                                            color: white; 
                                            padding: 14px; 
                                            border: none; 
                                            border-radius: 8px; 
                                            font-size: 1.1rem; 
                                            font-weight: bold; 
                                            cursor: pointer;
                                            box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    Continue to Prediction
                </button>
            </form>
            
            <div style="margin-top: 25px; text-align: center;">
                <a href="{{ url_for('logout') }}" style="color: #e74c3c; text-decoration: none; font-weight: bold; font-size: 0.9rem;">
                    Cancel and Logout
                </a>
            </div>
        </div>
    </div>
{% endblock %}
